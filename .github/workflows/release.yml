name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: "Re-run release even if tag already exists"
        required: false
        default: "false"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: Release if version is new
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read workspace version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to release
        id: should_release
        run: |
          EXISTS="${{ steps.check.outputs.exists }}"
          FORCE="${{ github.event.inputs.force }}"
          if [ "$EXISTS" = "false" ] || [ "$FORCE" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists and force=false — skipping release."
          fi

      - name: Install Rust toolchain
        if: steps.should_release.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Validate workspace versions match
        if: steps.should_release.outputs.run == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for crate in stygian-browser stygian-proxy stygian-graph stygian-mcp; do
            CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
              | jq -r --arg name "$crate" '.packages[] | select(.name == $name) | .version')
            if [ "$CARGO_VERSION" != "$VERSION" ]; then
              echo "Version mismatch in $crate: Cargo.toml has $CARGO_VERSION, expected $VERSION"
              exit 1
            fi
          done
          echo "All crate versions match ${{ steps.version.outputs.tag }} ✓"

      - name: Cache cargo
        if: steps.should_release.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      - name: Publish stygian-browser
        if: steps.should_release.outputs.run == 'true'
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-browser") | .version')
          if cargo search stygian-browser --limit 1 2>/dev/null | grep -q "^stygian-browser = \"$VERSION\""; then
            echo "stygian-browser@$VERSION already published, skipping"
          else
            cargo publish -p stygian-browser
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        if: steps.should_release.outputs.run == 'true'
        run: sleep 30

      - name: Publish stygian-proxy
        if: steps.should_release.outputs.run == 'true'
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-proxy") | .version')
          if cargo search stygian-proxy --limit 1 2>/dev/null | grep -q "^stygian-proxy = \"$VERSION\""; then
            echo "stygian-proxy@$VERSION already published, skipping"
          else
            cargo publish -p stygian-proxy
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        if: steps.should_release.outputs.run == 'true'
        run: sleep 30

      - name: Publish stygian-graph
        if: steps.should_release.outputs.run == 'true'
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-graph") | .version')
          if cargo search stygian-graph --limit 1 2>/dev/null | grep -q "^stygian-graph = \"$VERSION\""; then
            echo "stygian-graph@$VERSION already published, skipping"
          else
            cargo publish -p stygian-graph --all-features
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        if: steps.should_release.outputs.run == 'true'
        run: sleep 30

      - name: Publish stygian-mcp
        if: steps.should_release.outputs.run == 'true'
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-mcp") | .version')
          if cargo search stygian-mcp --limit 1 2>/dev/null | grep -q "^stygian-mcp = \"$VERSION\""; then
            echo "stygian-mcp@$VERSION already published, skipping"
          else
            cargo publish -p stygian-mcp
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Push version tag
        if: steps.should_release.outputs.run == 'true' && steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Extract changelog
        if: steps.should_release.outputs.run == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?$VERSION\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          else
            NOTES="Release $VERSION"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.should_release.outputs.run == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-alpha') || contains(steps.version.outputs.tag, '-beta') || contains(steps.version.outputs.tag, '-rc') }}
