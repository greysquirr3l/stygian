name: Release

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows:
      - "Auto-tag on release merge"
    types:
      - completed
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve release ref
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      release_ref: ${{ steps.tag.outputs.release_ref }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag and version
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            REF="${{ github.ref }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            git fetch --tags origin
            TAG=$(git tag --points-at "$SHA" | sort -V | tail -n 1)
            if [[ -z "$TAG" ]]; then
              echo "No tag found for workflow_run SHA $SHA"
              exit 1
            fi
            REF="refs/tags/$TAG"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            REF="refs/tags/v$VERSION"
          fi
          VERSION="${REF#refs/tags/v}"
          echo "release_ref=$REF" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"

  validate:
    name: Validate tag vs Cargo versions
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.release_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify workspace versions match tag
        run: |
          TAG_VERSION="${{ needs.resolve.outputs.version }}"
          for crate in stygian-browser stygian-proxy stygian-graph stygian-mcp; do
            CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
              | jq -r --arg name "$crate" '.packages[] | select(.name == $name) | .version')
            if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
              echo "Version mismatch in $crate: Cargo.toml has $CARGO_VERSION, tag is v$TAG_VERSION"
              exit 1
            fi
          done
          echo "All crate versions match tag v$TAG_VERSION ✓"

  publish:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    needs: [resolve, validate]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.release_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      - name: Publish stygian-extract-derive
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-extract-derive") | .version')
          if cargo search stygian-extract-derive --limit 1 2>/dev/null | grep -q "^stygian-extract-derive = \"$VERSION\""; then
            echo "stygian-extract-derive@$VERSION already published, skipping"
          else
            set +e
            OUTPUT=$(cargo publish -p stygian-extract-derive 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "$OUTPUT"
            elif echo "$OUTPUT" | grep -q "already exists on crates.io index"; then
              echo "stygian-extract-derive@$VERSION already exists on crates.io, skipping"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish stygian-browser
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-browser") | .version')
          if cargo search stygian-browser --limit 1 2>/dev/null | grep -q "^stygian-browser = \"$VERSION\""; then
            echo "stygian-browser@$VERSION already published, skipping"
          else
            set +e
            OUTPUT=$(cargo publish -p stygian-browser 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "$OUTPUT"
            elif echo "$OUTPUT" | grep -q "already exists on crates.io index"; then
              echo "stygian-browser@$VERSION already exists on crates.io, skipping"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish stygian-proxy
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-proxy") | .version')
          if cargo search stygian-proxy --limit 1 2>/dev/null | grep -q "^stygian-proxy = \"$VERSION\""; then
            echo "stygian-proxy@$VERSION already published, skipping"
          else
            set +e
            OUTPUT=$(cargo publish -p stygian-proxy 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "$OUTPUT"
            elif echo "$OUTPUT" | grep -q "already exists on crates.io index"; then
              echo "stygian-proxy@$VERSION already exists on crates.io, skipping"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish stygian-graph
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-graph") | .version')
          if cargo search stygian-graph --limit 1 2>/dev/null | grep -q "^stygian-graph = \"$VERSION\""; then
            echo "stygian-graph@$VERSION already published, skipping"
          else
            set +e
            OUTPUT=$(cargo publish -p stygian-graph --all-features 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "$OUTPUT"
            elif echo "$OUTPUT" | grep -q "already exists on crates.io index"; then
              echo "stygian-graph@$VERSION already exists on crates.io, skipping"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish stygian-mcp
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-mcp") | .version')
          if cargo search stygian-mcp --limit 1 2>/dev/null | grep -q "^stygian-mcp = \"$VERSION\""; then
            echo "stygian-mcp@$VERSION already published, skipping"
          else
            set +e
            OUTPUT=$(cargo publish -p stygian-mcp 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "$OUTPUT"
            elif echo "$OUTPUT" | grep -q "already exists on crates.io index"; then
              echo "stygian-mcp@$VERSION already exists on crates.io, skipping"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve, publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.release_ref }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?$VERSION\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          else
            NOTES="Release $VERSION"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_ref }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.resolve.outputs.version, '-alpha') || contains(needs.resolve.outputs.version, '-beta') || contains(needs.resolve.outputs.version, '-rc') }}
