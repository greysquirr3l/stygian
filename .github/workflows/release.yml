name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_run:
    # Fires when auto-tag pushes via GITHUB_TOKEN.
    workflows:
      - "Auto-tag on release merge"
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.2.3)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve release ref
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      release_ref: ${{ steps.tag.outputs.release_ref }}
      release_sha: ${{ steps.tag.outputs.release_sha }}
      version: ${{ steps.tag.outputs.version }}
      should_release: ${{ steps.tag.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag and version
        id: tag
        run: |
          set -euo pipefail
          git fetch --tags --force origin

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            SHA=$(git rev-list -n 1 "$TAG" 2>/dev/null || true)
            if [[ -z "$SHA" ]]; then
              echo "Tag $TAG not found"
              exit 1
            fi
            REF="refs/tags/$TAG"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            REF="${{ github.ref }}"
            SHA="${{ github.sha }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG=$(git tag --points-at "$SHA" \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V | tail -n 1 || true)
            if [[ -z "$TAG" ]]; then
              echo "No semver tag found for workflow_run SHA $SHA — skipping release"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            REF="refs/tags/$TAG"
          fi
          VERSION="${REF#refs/tags/v}"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "release_ref=$REF" >> "$GITHUB_OUTPUT"
          echo "release_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"

  validate:
    name: Validate tag vs Cargo versions
    runs-on: ubuntu-latest
    needs: resolve
    if: ${{ needs.resolve.outputs.should_release == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.release_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify workspace versions match tag
        run: |
          TAG_VERSION="${{ needs.resolve.outputs.version }}"
          for crate in stygian-browser stygian-proxy stygian-graph stygian-mcp; do
            CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
              | jq -r --arg name "$crate" '.packages[] | select(.name == $name) | .version')
            if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
              echo "Version mismatch in $crate: Cargo.toml has $CARGO_VERSION, tag is v$TAG_VERSION"
              exit 1
            fi
          done
          echo "All crate versions match tag v$TAG_VERSION ✓"

  verify-ci:
    name: Verify CI is green
    runs-on: ubuntu-latest
    needs: resolve
    if: ${{ needs.resolve.outputs.should_release == 'true' }}
    steps:
      - name: Wait for CI workflow result on tagged commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ needs.resolve.outputs.release_sha }}
        run: |
          set -euo pipefail

          sha="${RELEASE_SHA}"
          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}/actions/runs?head_sha=${sha}&event=push&per_page=50"

          echo "Checking CI status for ${repo}@${sha}"

          for attempt in {1..30}; do
            json=$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api}")

            ci_status=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .status' | head -n1)
            ci_conclusion=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .conclusion' | head -n1)

            if [[ -z "${ci_status}" ]]; then
              echo "Attempt ${attempt}/30: CI workflow run not found yet; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_status}" != "completed" ]]; then
              echo "Attempt ${attempt}/30: CI is ${ci_status}; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_conclusion}" == "success" ]]; then
              echo "CI completed successfully for ${sha}"
              exit 0
            fi

            echo "CI did not pass for ${sha}: conclusion=${ci_conclusion}"
            exit 1
          done

          echo "Timed out waiting for CI completion on ${sha}"
          exit 1

  publish:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    needs: [resolve, validate, verify-ci]
    if: ${{ needs.resolve.outputs.should_release == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.release_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      - name: Publish stygian-extract-derive
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-extract-derive") | .version')
          if cargo search stygian-extract-derive --limit 1 2>/dev/null | grep -q "^stygian-extract-derive = \"$VERSION\""; then
            echo "stygian-extract-derive@$VERSION already published, skipping"
          else
            set +e
            OUTPUT=$(cargo publish -p stygian-extract-derive 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "$OUTPUT"
            elif echo "$OUTPUT" | grep -q "already exists on crates.io index"; then
              echo "stygian-extract-derive@$VERSION already exists on crates.io, skipping"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish stygian-browser
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-browser") | .version')
          if cargo search stygian-browser --limit 1 2>/dev/null | grep -q "^stygian-browser = \"$VERSION\""; then
            echo "stygian-browser@$VERSION already published, skipping"
          else
            set +e
            OUTPUT=$(cargo publish -p stygian-browser 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "$OUTPUT"
            elif echo "$OUTPUT" | grep -q "already exists on crates.io index"; then
              echo "stygian-browser@$VERSION already exists on crates.io, skipping"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish stygian-proxy
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-proxy") | .version')
          if cargo search stygian-proxy --limit 1 2>/dev/null | grep -q "^stygian-proxy = \"$VERSION\""; then
            echo "stygian-proxy@$VERSION already published, skipping"
          else
            set +e
            OUTPUT=$(cargo publish -p stygian-proxy 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "$OUTPUT"
            elif echo "$OUTPUT" | grep -q "already exists on crates.io index"; then
              echo "stygian-proxy@$VERSION already exists on crates.io, skipping"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish stygian-graph
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-graph") | .version')
          if cargo search stygian-graph --limit 1 2>/dev/null | grep -q "^stygian-graph = \"$VERSION\""; then
            echo "stygian-graph@$VERSION already published, skipping"
          else
            set +e
            OUTPUT=$(cargo publish -p stygian-graph --all-features 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "$OUTPUT"
            elif echo "$OUTPUT" | grep -q "already exists on crates.io index"; then
              echo "stygian-graph@$VERSION already exists on crates.io, skipping"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish stygian-mcp
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "stygian-mcp") | .version')
          if cargo search stygian-mcp --limit 1 2>/dev/null | grep -q "^stygian-mcp = \"$VERSION\""; then
            echo "stygian-mcp@$VERSION already published, skipping"
          else
            set +e
            OUTPUT=$(cargo publish -p stygian-mcp 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "$OUTPUT"
            elif echo "$OUTPUT" | grep -q "already exists on crates.io index"; then
              echo "stygian-mcp@$VERSION already exists on crates.io, skipping"
            else
              echo "$OUTPUT"
              exit $STATUS
            fi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve, publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.release_ref }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?$VERSION\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          else
            NOTES="Release $VERSION"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_ref }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.resolve.outputs.version, '-alpha') || contains(needs.resolve.outputs.version, '-beta') || contains(needs.resolve.outputs.version, '-rc') }}
