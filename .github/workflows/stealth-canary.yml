name: Stealth Canary

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Synthetic check pass threshold (0.0–1.0, default: 0.95)'
        required: false
        default: '0.95'
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  issues: write
  contents: read

env:
  CARGO_TERM_COLOR: always
  THRESHOLD: ${{ inputs.threshold || '0.95' }}
  HISTORY_PATH: history/canary-history.jsonl
  REQUIRED_TARGETS: tools/stealth-canary/data/required-targets.toml

jobs:
  # ── Stage 1: Run verify_stealth against configured canary targets ────────
  probe:
    name: Stealth probe
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-canary-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-canary-

      - name: Install Chromium
        run: |
          sudo apt-get update -q
          sudo apt-get install -y chromium-browser
          CHROME_BIN="$(which chromium-browser)"
          echo "CHROME_PATH=${CHROME_BIN}" >> "$GITHUB_ENV"
          echo "STYGIAN_CHROME_PATH=${CHROME_BIN}" >> "$GITHUB_ENV"

      - name: Validate stealth canary config
        run: python3 .github/scripts/validate_stealth_canary.py

      - name: Build stealth probe
        run: cargo build --example stealth_probe --all-features

      - name: Restore trend history
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: history
          key: ${{ runner.os }}-stealth-canary-history-v1
          restore-keys: ${{ runner.os }}-stealth-canary-history-

      - name: Run stealth probe (configured canaries)
        id: probe
        run: |
          set -u
          : > probe-stderr.txt
          : > probe-results.ndjson

          python3 - <<'PY' > canary-targets.tsv
          import pathlib
          import tomllib

          doc = tomllib.loads(pathlib.Path('.github/stealth-canary.toml').read_text())
          for entry in doc.get('canary', []):
              label = entry.get('label', 'unnamed')
              url = entry['url']
              threshold = float(entry.get('threshold', 0.90))
              advisory = bool(entry.get('advisory', False))
              print(f"{label}\t{url}\t{threshold:.6f}\t{str(advisory).lower()}")
          PY

          HARD_FAIL=false
          ANY_FAIL=false

          while IFS=$'\t' read -r LABEL URL ENTRY_THRESHOLD ADVISORY; do
            THRESHOLD_TO_USE="$ENTRY_THRESHOLD"
            # Preserve workflow_dispatch override for the synthetic check.
            if [[ "$LABEL" == "synthetic-injection" && -n "${THRESHOLD:-}" ]]; then
              THRESHOLD_TO_USE="$THRESHOLD"
            fi

            set +e
            ./target/debug/examples/stealth_probe \
              --threshold "$THRESHOLD_TO_USE" \
              "$URL" \
              > probe-one.json 2> probe-one-stderr.txt
            EXIT=$?
            set -e

            {
              echo "=== ${LABEL} (${URL}) ==="
              cat probe-one-stderr.txt
              echo
            } >> probe-stderr.txt

            if [[ "$EXIT" -ne 0 ]]; then
              ANY_FAIL=true
              if [[ "$ADVISORY" != "true" ]]; then
                HARD_FAIL=true
              fi
            fi

            jq -c \
              --arg label "$LABEL" \
              --arg url "$URL" \
              --arg threshold "$THRESHOLD_TO_USE" \
              --arg advisory "$ADVISORY" \
              --argjson exit_code "$EXIT" \
              '
                (.[0] // {"ok": false, "error": "missing probe result"})
                + {
                    label: $label,
                    url: $url,
                    threshold: ($threshold | tonumber),
                    advisory: ($advisory == "true"),
                    exit_code: $exit_code
                  }
              ' probe-one.json >> probe-results.ndjson
          done < canary-targets.tsv

          jq -s '.' probe-results.ndjson > probe-report.json
          set +e
          cat probe-report.json
          cat probe-stderr.txt >&2 || true

          if [[ "$HARD_FAIL" == "true" ]]; then
            echo "regression=true" >> "$GITHUB_OUTPUT"
          else
            echo "regression=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$ANY_FAIL" == "true" ]]; then
            echo "issue=true" >> "$GITHUB_OUTPUT"
          else
            echo "issue=false" >> "$GITHUB_OUTPUT"
          fi

          jq -r '
            "## Stealth Canary Probe Results",
            "",
            "| label | url | threshold | score_pct | ok | advisory |",
            "|---|---|---:|---:|---|---|",
            (.[] | "| \(.label) | \(.url) | \(.threshold) | \((.score_pct // 0)) | \(.ok) | \(.advisory) |")
          ' probe-report.json >> "$GITHUB_STEP_SUMMARY"

      - name: Run trend detector (T84)
        id: trend
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u
          mkdir -p history
          python3 tools/stealth-canary/trend_cli.py \
            --probe-report probe-report.json \
            --canary-config .github/stealth-canary.toml \
            --required-targets "${REQUIRED_TARGETS}" \
            --history "${HISTORY_PATH}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-url "${GITHUB_RUN_URL}" \
            --verdict canary-verdict.json \
            --summary canary-summary.md \
            --artifact probe-report.json \
            --artifact probe-stderr.txt \
            --artifact "${HISTORY_PATH}" \
            --artifact tools/stealth-canary/data/required-targets.toml
          TREND_EXIT=$?
          set +e

          if [[ "${TREND_EXIT}" -ne 0 ]]; then
            echo "trend_regression=true" >> "$GITHUB_OUTPUT"
          else
            echo "trend_regression=false" >> "$GITHUB_OUTPUT"
          fi

          # Append the trend summary to the job summary alongside the probe results.
          cat canary-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Persist trend history for next run
        if: always()
        run: |
          mkdir -p history
          if [[ -f "${HISTORY_PATH}" ]]; then
            dest_path="history/canary-history.jsonl"
            src_abs="$(cd "$(dirname "${HISTORY_PATH}")" && pwd)/$(basename "${HISTORY_PATH}")"
            dest_abs="$(cd "$(dirname "${dest_path}")" && pwd)/$(basename "${dest_path}")"
            if [[ "${src_abs}" != "${dest_abs}" ]]; then
              cp "${HISTORY_PATH}" "${dest_path}"
            fi
          fi

      - name: Upload probe report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: probe-report
          path: |
            probe-report.json
            probe-stderr.txt

      - name: Upload trend artifacts (T84)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trend-report
          path: |
            canary-verdict.json
            canary-summary.md
            history/canary-history.jsonl

      - name: Create or update regression issue
        if: steps.probe.outputs.issue == 'true' || steps.trend.outputs.trend_regression == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          TITLE="Stealth regression detected ${DATE}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          ISSUE_BODY_FILE="/tmp/stealth-regression-issue.md"

          FAILED_TARGETS="$(
            jq -r '.[]
              | select(.ok == false)
              | "- \(.label) (advisory=\(.advisory), threshold=\(.threshold), score_pct=\((.score_pct // "n/a"))) -> \(.url)"
            ' probe-report.json 2>/dev/null
          )"

          FAILED_CHECKS="$(
            {
              jq -r '.[] | select(.ok == false) as $row | $row.failed_checks[]?.id | "- [\($row.label)] check: \(.)"' probe-report.json 2>/dev/null
              jq -r '.[] | select(.error != null) | "- [\(.label)] error: \(.error)"' probe-report.json 2>/dev/null
            } | head -20
          )"

          TREND_FAILS="$(
            jq -r '
              .verdicts
              | to_entries[]
              | select(.value.is_hard_fail == true)
              | "- **\(.key)**: status=\(.value.status) current=\(.value.current_score) rolling_mean=\(.value.rolling_mean // "n/a") reason=\(.value.reason)"
            ' canary-verdict.json 2>/dev/null
          )"

          if [[ -z "${FAILED_TARGETS}" ]]; then
            FAILED_TARGETS="_(none parsed; see uploaded probe report)_"
          fi

          if [[ -z "${FAILED_CHECKS}" ]]; then
            FAILED_CHECKS="_(see uploaded probe report)_"
          fi

          if [[ -z "${TREND_FAILS}" ]]; then
            TREND_FAILS="_(no trend-axis hard-fails)_"
          fi

          OWNERSHIP_BLOCK="$(
            jq -r '
              .required_labels as $labels
              | ["label", "owner", "secondary", "runbook"]
              | join(" | ")
              , "--- | --- | --- | ---"
              , (
                $labels[]
                | "- \(.) | see `tools/stealth-canary/data/required-targets.toml` | see data file | see data file"
              )
            ' canary-verdict.json 2>/dev/null
          )"

          cat > "${ISSUE_BODY_FILE}" <<EOF
          ## Stealth regression detected

          **Date**: ${DATE}

          The daily stealth canary detected one or more failing targets from \`.github/stealth-canary.toml\`, **or** the T84 trend detector flagged a regression over the rolling window.

          ### Failed targets (probe axis)

          ${FAILED_TARGETS}

          ### Failed checks

          ${FAILED_CHECKS}

          ### Trend-axis hard-fails (T84)

          ${TREND_FAILS}

          ### Ownership & runbook

          ${OWNERSHIP_BLOCK}

          Full ownership / runbook / artifact pointers live in \`tools/stealth-canary/data/required-targets.toml\` and the rendered Markdown in the workflow step summary.

          ### Artifacts

          Download these artifacts from the run for the full diagnostic context:

          - \`probe-report\` — raw per-target JSON + stderr (\`stealth_probe\` output)
          - \`trend-report\` — verdict JSON, Markdown summary, and the rolling history JSONL

          ### Details

          Run: ${RUN_URL}
          EOF

          EXISTING=$(gh issue list \
            --state open \
            --search '"Stealth regression detected" in:title' \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "${EXISTING}" ]]; then
            gh issue comment "${EXISTING}" \
              --body "Another regression detected on ${DATE}. Run: ${RUN_URL}"
            echo "Commented on existing issue #${EXISTING}"
          else
            gh issue create --title "${TITLE}" --body-file "${ISSUE_BODY_FILE}"
          fi

      - name: Fail if hard regression detected
        if: steps.probe.outputs.regression == 'true' || steps.trend.outputs.trend_regression == 'true'
        run: |
          echo "Stealth regression detected (hard fail)"
          if [[ "${{ steps.probe.outputs.regression }}" == "true" ]]; then
            echo "- probe axis: at least one non-advisory canary target failed its threshold"
          fi
          if [[ "${{ steps.trend.outputs.trend_regression }}" == "true" ]]; then
            echo "- trend axis: T84 trend detector flagged a regression over the rolling window"
          fi
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
