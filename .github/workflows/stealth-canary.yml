name: Stealth Canary

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Synthetic check pass threshold (0.0–1.0, default: 0.95)'
        required: false
        default: '0.95'

permissions:
  issues: write

env:
  CARGO_TERM_COLOR: always
  THRESHOLD: ${{ inputs.threshold || '0.95' }}

jobs:
  # ── Stage 1: Run verify_stealth against about:blank ──────────────────────
  probe:
    name: Stealth probe
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-canary-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-canary-

      - name: Install Chromium
        run: |
          sudo apt-get update -q
          sudo apt-get install -y chromium-browser
          echo "CHROME_PATH=$(which chromium-browser)" >> "$GITHUB_ENV"

      - name: Build stealth probe
        run: cargo build --example stealth_probe --all-features

      - name: Run stealth probe (synthetic)
        id: probe
        run: |
          set +e
          ./target/debug/examples/stealth_probe \
            --threshold "$THRESHOLD" \
            about:blank \
            > probe-report.json 2>probe-stderr.txt
          EXIT=$?
          cat probe-report.json
          cat probe-stderr.txt >&2 || true
          if [ "$EXIT" -eq 0 ]; then
            echo "regression=false" >> "$GITHUB_OUTPUT"
          else
            echo "regression=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload probe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-report
          path: |
            probe-report.json
            probe-stderr.txt

      - name: Create or update regression issue
        if: steps.probe.outputs.regression == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          TITLE="Stealth regression detected ${DATE}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          FAILED_CHECKS="$(jq -r '.failed_checks[]?' probe-report.json 2>/dev/null | head -20 | sed 's/^/- /' || echo "_(see uploaded probe report)_")"

          BODY="## Stealth regression detected

**Date**: ${DATE}

The daily stealth canary detected failing checks against \`about:blank\`.

### Failed checks
${FAILED_CHECKS}

### Details
Run: ${RUN_URL}

Download the \`probe-report\` artifact from the run above for the full JSON report and stderr output."

          EXISTING=$(gh issue list \
            --state open \
            --search '"Stealth regression detected" in:title' \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "${EXISTING}" ]]; then
            gh issue comment "${EXISTING}" \
              --body "Another regression detected on ${DATE}. Run: ${RUN_URL}"
            echo "Commented on existing issue #${EXISTING}"
          else
            gh issue create --title "${TITLE}" --body "${BODY}"
          fi

