[book]
title       = "mycelium"
description = "High-performance web scraping toolkit for Rust"
authors     = ["greysquirr3l"]
language    = "en"
src         = "src"

[build]
build-dir      = "book"
create-missing = false

[output.html]
site-url             = "/mycelium/"
git-repository-url   = "https://github.com/greysquirr3l/mycelium"
edit-url-template    = "https://github.com/greysquirr3l/mycelium/edit/main/book/src/{path}"
default-theme        = "ayu"
preferred-dark-theme = "ayu"
fold.enable          = true
fold.level           = 1

[output.html.search]
limit-results    = 20
use-boolean-and  = true
boost-title      = 2
boost-hierarchy  = 1
boost-paragraph  = 1
expand           = true
heading-split-level = 3
