[build]
# Use all available cores
jobs = -1

[target.'cfg(all())']
rustflags = [
    # Enable all clippy pedantic lints
    "-Wclippy::pedantic",
    # Deny warnings in CI
    # "-Dwarnings",
]

[alias]
# Quick check without full build
c = "check --workspace"
# Build all targets
b = "build --workspace"
# Test all
t = "test --workspace"
# Clippy profile used in this repository.
# IMPORTANT: `--all-features` is required so feature-gated lints
# (e.g. `#[cfg(feature = "metrics")]` impls) are exercised.
# Without it, hidden feature-gated code paths can carry lints
# that only surface under --all-features and break CI later.
# See PROGRESS.md `T-strict-clippy` learning entry for context.
l = "clippy --workspace --all-features --all-targets -- -W clippy::all -W clippy::pedantic -W clippy::nursery -W clippy::cargo -W clippy::perf -A clippy::module_name_repetitions -A clippy::must_use_candidate -A clippy::missing_errors_doc -A clippy::missing_panics_doc -A clippy::struct_excessive_bools -A clippy::multiple_crate_versions -D clippy::unwrap_used -D clippy::expect_used -D clippy::panic -D clippy::indexing_slicing -D clippy::cast_ptr_alignment -D clippy::suspicious -D warnings"
# Full preflight check
preflight = "run --package preflight-check --"
