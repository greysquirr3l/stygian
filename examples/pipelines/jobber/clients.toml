[[services]]
name   = "jobber"
kind   = "graphql"
plugin = "jobber"

[[nodes]]
name    = "fetch_clients"
service = "jobber"

[nodes.params]
operation_name = "ListClients"
query = """
query ListClients($first: Int, $after: String) {
  clients(first: $first, after: $after) {
    edges {
      node {
        id
        name
        email
        phone
        billingAddress { street city province postalCode country }
        balance
        createdAt
      }
    }
    pageInfo { hasNextPage endCursor }
  }
}
"""

[nodes.params.pagination]
strategy       = "cursor"
page_info_path = "data.clients.pageInfo"
edges_path     = "data.clients.edges"
