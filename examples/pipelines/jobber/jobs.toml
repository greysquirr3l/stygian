[[services]]
name   = "jobber"
kind   = "graphql"
plugin = "jobber"

[[nodes]]
name    = "fetch_jobs"
service = "jobber"

[nodes.params]
operation_name = "ListJobs"
query = """
query ListJobs($first: Int, $after: String) {
  jobs(first: $first, after: $after) {
    edges {
      node {
        id
        title
        jobStatus
        client { id name }
        assignedTo { id name }
        startAt
        endAt
        completedAt
        total
        createdAt
      }
    }
    pageInfo { hasNextPage endCursor }
  }
}
"""

[nodes.params.pagination]
strategy       = "cursor"
page_info_path = "data.jobs.pageInfo"
edges_path     = "data.jobs.edges"
