[[services]]
name   = "jobber"
kind   = "graphql"
plugin = "jobber"

[[services]]
name  = "claude"
kind  = "claude"
model = "claude-sonnet-4-5"
api_key = "${env:ANTHROPIC_API_KEY}"

# ─── Parallel fetch nodes (no dependencies between them) ─────────────────────

[[nodes]]
name    = "fetch_clients"
service = "jobber"

[nodes.params]
operation_name = "ListClients"
query = """
query ListClients($first: Int, $after: String) {
  clients(first: $first, after: $after) {
    edges { node { id name email phone balance createdAt } }
    pageInfo { hasNextPage endCursor }
  }
}
"""

[nodes.params.pagination]
strategy       = "cursor"
page_info_path = "data.clients.pageInfo"
edges_path     = "data.clients.edges"

# ─────────────────────────────────────────────────────────────────────────────

[[nodes]]
name    = "fetch_jobs"
service = "jobber"

[nodes.params]
operation_name = "ListJobs"
query = """
query ListJobs($first: Int, $after: String) {
  jobs(first: $first, after: $after) {
    edges { node { id title jobStatus total startAt endAt } }
    pageInfo { hasNextPage endCursor }
  }
}
"""

[nodes.params.pagination]
strategy       = "cursor"
page_info_path = "data.jobs.pageInfo"
edges_path     = "data.jobs.edges"

# ─────────────────────────────────────────────────────────────────────────────

[[nodes]]
name    = "fetch_invoices"
service = "jobber"

[nodes.params]
operation_name = "ListInvoices"
query = """
query ListInvoices($first: Int, $after: String) {
  invoices(first: $first, after: $after) {
    edges { node { id invoiceNumber invoiceStatus total balance issuedDate dueDate } }
    pageInfo { hasNextPage endCursor }
  }
}
"""

[nodes.params.pagination]
strategy       = "cursor"
page_info_path = "data.invoices.pageInfo"
edges_path     = "data.invoices.edges"

# ─────────────────────────────────────────────────────────────────────────────

[[nodes]]
name    = "fetch_quotes"
service = "jobber"

[nodes.params]
operation_name = "ListQuotes"
query = """
query ListQuotes($first: Int, $after: String) {
  quotes(first: $first, after: $after) {
    edges { node { id title quoteStatus total quoteNumber createdAt } }
    pageInfo { hasNextPage endCursor }
  }
}
"""

[nodes.params.pagination]
strategy       = "cursor"
page_info_path = "data.quotes.pageInfo"
edges_path     = "data.quotes.edges"

# ─── AI normalisation nodes (each depends on its fetch node) ─────────────────

[[nodes]]
name        = "normalise_clients"
service     = "claude"
depends_on  = ["fetch_clients"]

[nodes.params]
schema_file = "examples/pipelines/jobber/schemas/client.schema.json"
prompt      = "Extract and normalise the Jobber client records to the canonical Client JSON Schema. Include all fields. Omit null values."

[[nodes]]
name        = "normalise_jobs"
service     = "claude"
depends_on  = ["fetch_jobs"]

[nodes.params]
schema_file = "examples/pipelines/jobber/schemas/job.schema.json"
prompt      = "Extract and normalise the Jobber job records to the canonical Job JSON Schema. Include all fields. Omit null values."

[[nodes]]
name        = "normalise_invoices"
service     = "claude"
depends_on  = ["fetch_invoices"]

[nodes.params]
schema_file = "examples/pipelines/jobber/schemas/invoice.schema.json"
prompt      = "Extract and normalise the Jobber invoice records to the canonical Invoice JSON Schema. Include line items."

[[nodes]]
name        = "normalise_quotes"
service     = "claude"
depends_on  = ["fetch_quotes"]

[nodes.params]
schema_file = "examples/pipelines/jobber/schemas/quote.schema.json"
prompt      = "Extract and normalise the Jobber quote records to the canonical Quote JSON Schema."
