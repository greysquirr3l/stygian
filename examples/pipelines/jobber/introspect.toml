[[services]]
name     = "jobber"
kind     = "graphql"
plugin   = "jobber"

[[nodes]]
name    = "introspect_jobber"
service = "jobber"

[nodes.params]
operation_name = "IntrospectionQuery"
output_file    = "~/.mycelium/cache/jobber_schema.json"
query = """
query IntrospectionQuery {
  __schema {
    queryType { name }
    mutationType { name }
    types {
      name
      kind
      description
      fields(includeDeprecated: false) {
        name
        description
        type { name kind ofType { name kind } }
      }
    }
  }
}
"""
