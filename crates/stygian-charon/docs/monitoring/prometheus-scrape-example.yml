global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: stygian_charon
    static_configs:
      - targets:
          - 127.0.0.1:9107
    metrics_path: /metrics
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: charon-local
